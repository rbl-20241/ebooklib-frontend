<p-dialog
  [showHeader]="false"
  appendTo="body"
  [modal]="true"
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  (onHide)="cancel()"
>
  <div class="profile-dialog-content">

    <div class="profile-dialog-text">
      <div>
        <p class="profile-title">Profiel bewerken</p>

        <div>
          <form [formGroup]="profileForm" (ngSubmit)="updateAccount()">
            <div class="field dialog-input">
              <label for="username" class="block">Gebruikersnaam:</label>
              <input type="text" pInputText formControlName="username"/>
            </div>

            <div class="field dialog-input">
              <label for="password" class="block">Oud wachtwoord:</label><br/>
              <p-password formControlName="password_old" [toggleMask]="true" [feedback]="false">
              </p-password>
            </div>

            <div class="field dialog-input">
              <label for="password" class="block">Nieuw wachtwoord:</label><br/>
              <p-password formControlName="password" [toggleMask]="true" [feedback]="false">
              </p-password>
            </div>

            <p-select
              [options]="roles"
              optionLabel="label"
              optionValue="value"
              formControlName="role"
              appendTo="body"
              panelStyleClass="role-select-panel"
              placeholder="Selecteer een rol">
            </p-select>
            @if(errorMessage()) {
              <p class="error">{{ errorMessage() }}</p>
            }

            <div class="profile-dialog-button">
              <button
                pButton
                pRipple
                type="button"
                class="dialog-button"
                (click)="cancel()"
              >
                <i class="pi pi-times" pButtonIcon></i>
                <span pButtonLabel>Annuleren</span>
              </button>

              <button
                pButton
                pRipple
                type="submit"
                class="dialog-button"
              >
                <i class="pi pi-check" pButtonIcon></i>
                <span pButtonLabel>Ok</span>
              </button>
            </div>
          </form>

        </div>
      </div>


    </div>
  </div>
</p-dialog>
