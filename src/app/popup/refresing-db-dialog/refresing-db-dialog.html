<p-dialog
  [showHeader]="false"
  appendTo="body"
  [modal]="true"
  [visible]="displayRefreshingDbDialog()"
  (visibleChange)="displayRefreshingDbDialog.set($event)"
  (onHide)="cancel()"
>

  <div class="refreshing">
    <h3>Database met boeken wordt opnieuw ingelezen</h3>
    <p>
      <p-image
        src="loading.gif"
        alt="Even geduld..."
      ></p-image>
    </p>
    @if (errorMessage()) {
      <p class="error">{{errorMessage()}}</p>
      <button
        pButton
        pRipple
        type="button"
        class="dialog-button"
        (click)="cancel()"
      >
        <i class="pi pi-times" pButtonIcon></i>
        <span pButtonLabel>Ok</span>
      </button>

    } @else {
      <p>Dit kan even duren....</p>
    }
  </div>
</p-dialog>
