<p-dialog
  header="EBook mailen"
  appendTo="body"
  [modal]="true"
  closable="false"
  (onShow)="onShowDialog()"
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  (onHide)="cancel()"
>
  <div class="dialog-form">

    <form [formGroup]="mailForm" (ngSubmit)="mailBook()">
      <div class="field">
        <label for="mailTo" class="block">"{{ getBookToMail() }}" kopi&euml;ren naar:</label>
        <input type="text" pInputText formControlName="mailTo"/>
      </div>

      @if(errorMessage()) {
        <p class="error">{{ errorMessage() }}</p>
      }

      <div class="dialog-button-group">
        <button
          pButton
          pRipple
          type="button"
          class="dialog-button"
          (click)="cancel()"
        >
          <i class="pi pi-times" pButtonIcon></i>
          <span pButtonLabel>Annuleer</span>
        </button>

        <button
          pButton
          pRipple
          type="submit"
          class="dialog-button"
        >
          <i class="pi pi-send" pButtonIcon></i>
          <span pButtonLabel>Mailen</span>
        </button>

      </div>
    </form>
  </div>
</p-dialog>
